<!DOCTYPE html>
<html>

<head>
    <title>Modulplaner</title>
    <meta content="">
    <link href="css/styles.css" rel="stylesheet">
    </link>
    <script type="module" src="js/moduleplan.js"></script>
</head>

<body>
    <main>
        <div id="module_overview">
            <h2>Modulübersicht</h2>
            <ul id="module_selector"></ul>
        </div>

        <div id="timed_modules">
            <div id="timetable_header">
                <button class="header-button" id="prev_week_button"><< vorherige Woche</button>
                <h2 id="timetable_heading">Stundenplan</h2>
                <button class="header-button" id="next_week_button">nächste Woche >></button>
            </div>
            <table id="timetable">
                <thead>
                    <tr>
                        <td>Uhrzeit / Tag</td>
                        <th>Montag</th>
                        <th>Dienstag</th>
                        <th>Mittwoch</th>
                        <th>Donnerstag</th>
                        <th>Freitag</th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="block1">
                        <th>8:15 - 9:45</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                    <tr id="block2">
                        <th>10:15 - 11:45</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                    <tr id="block3">
                        <th>12:30 - 14:00</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                    <tr id="block4">
                        <th>14:15 - 15:45</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                    <tr id="block5">
                        <th>16:00 - 17:30</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                    <tr id="block6">
                        <th>17:30 - 19:00</th>
                        <td class="montag"></td>
                        <td class="dienstag"></td>
                        <td class="mittwoch"></td>
                        <td class="donnerstag"></td>
                        <td class="freitag"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <dialog id="slot_popup">
        <h2>Modul-Termine</h2>
        <ul id="module_slots"></ul>
        <div class="popup_buttons">
            <button class="popup_button" id="slot_submit">Buchen</button>
            <button class="popup_button" id="slot_cancel">Abbrechen</button>
        </div>
    </dialog>

    <dialog id="doubled_slot_popup">
        <h2>Achtung doppelte Termine!</h2>
        <div class="popup_buttons">
            <button class="popup_button" id="doubled_overwrite">Überschreiben</button>
            <button class="popup_button" id="doubled_add">Hinzufügen</button>
            <button class="popup_button" id="doubled_cancel">Abbrechen</button>
        </div>
    </dialog>

    <dialog id="edit_slot_popup">
        <h2>Termin Bearbeiten</h2>
        <form></form>
        <div class="popup_buttons">
            <button class="popup_button" id="edit_submit">Speichern</button>
            <button class="popup_button" id="edit_drop">Abmelden</button>
            <button class="popup_button" id="edit_cancel">Abbrechen</button>
        </div>
    </dialog>
</body>

</html>
